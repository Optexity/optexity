[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
user=optexity

[program:xvfb]
command=Xvfb :99 -screen 0 1440x900x24 -ac
autorestart=true
priority=10
user=optexity

[program:openbox]
command=bash -c "sleep 2 && openbox --sm-disable"
environment=DISPLAY=":99"
autorestart=true
priority=20
user=optexity

[program:x11vnc]
command=bash -c "sleep 2 && x11vnc -display :99 -forever -shared -nopw -rfbport 5900 -listen 127.0.0.1"
autorestart=true
priority=30
user=optexity

[program:novnc]
command=websockify --web /usr/share/novnc 8080 localhost:5900
autorestart=true
priority=40
user=optexity